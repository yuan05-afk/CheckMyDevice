[sgx]
# This is the same first-party listing endpoint used by the SGX derivatives page.
list_url = https://api3.sgx.com/infofeed/Apps?A=COW_Tickdownload_Content&B=TimeSalesData&C_T=20
download_base_url = https://links.sgx.com/1.0.0/derivatives-historical
timeout_seconds = 60
max_attempts = 4
backoff_initial_seconds = 1.0
user_agent = Yuan-Andrei-Mariano-SGX-Data-Downloader/1.0

[paths]
# Relative paths are resolved from this configuration file, not from the shell CWD.
output_dir = runtime/data
manifest_path = runtime/state/manifest.json
logging_config = logging.ini
log_file = runtime/logs/sgx_downloader.log

[download]
chunk_size = 1048576
verify_zip = true

