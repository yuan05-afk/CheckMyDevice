[loggers]
keys=root,sgx_downloader

[handlers]
keys=console,file

[formatters]
keys=console,file

[logger_root]
level=WARNING
handlers=console,file

[logger_sgx_downloader]
level=DEBUG
handlers=console,file
qualname=sgx_downloader
propagate=0

[handler_console]
class=StreamHandler
level=INFO
formatter=console
args=(sys.stdout,)

[handler_file]
class=handlers.RotatingFileHandler
level=DEBUG
formatter=file
args=('%(log_file)s', 'a', 5242880, 5, 'utf-8')

[formatter_console]
format=%(levelname)s %(message)s

[formatter_file]
format=%(asctime)s %(levelname)-8s %(name)s [pid=%(process)d] %(message)s
datefmt=%Y-%m-%dT%H:%M:%S%z

